<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Luxury Notification</title>

    <style>
        /* 🌌 Background (for demo) */
        body {
            height: 100vh;
            background: radial-gradient(circle at center, #ca7979, #000);
            background-image: url('https://picsum.photos/200/300');
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 💎 Glass Notification */
        #toast {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);

            padding: 30px 50px;
            border-radius: 20px;

            /* Glassmorphism */
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            color: gold;
            font-size: 22px;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            text-align: center;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 9999;
        }

        /* ✨ Show */
        #toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 🎉 Button */
        button {
            padding: 12px 25px;
            background: gold;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 🎇 Firework particle */
        .firework {
            position: fixed;
            width: 6px;
            height: 6px;
            background: gold;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 1.2s ease-out forwards;
        }

        /* 💥 Explosion animation */
        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(var(--x), var(--y)) scale(0.3);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <button onclick="showToast()">Celebrate 🎉</button>

    <div id="toast">🎂 Thank You for Celebrating!</div>

    <script>
        function showToast() {
            const toast = document.getElementById("toast");

            toast.classList.add("show");

            setTimeout(() => {
                createFireworks(window.innerWidth / 2, window.innerHeight / 2);
                toast.classList.remove("show");
            }, 2500);
        }

        /* 🎇 Fireworks Generator */
        function createFireworks(x, y) {
            for (let i = 0; i < 40; i++) {
                let particle = document.createElement("div");
                particle.classList.add("firework");

                particle.style.left = x + "px";
                particle.style.top = y + "px";

                let angle = Math.random() * 2 * Math.PI;
                let distance = Math.random() * 200;

                particle.style.setProperty("--x", Math.cos(angle) * distance + "px");
                particle.style.setProperty("--y", Math.sin(angle) * distance + "px");

                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 1200);
            }
        }
    </script>

</body>

</html>
